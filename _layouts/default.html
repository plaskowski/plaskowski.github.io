<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&family=JetBrains+Mono:ital@1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body>

  <header class="site-header">
    <div class="site-title-group">
      <a class="site-title" href="/"><span class="site-name">{{ site.title }}</span><span class="dev-suffix">/dev/swe-outlet</span></a>
      <span class="site-tagline">{{ site.description }}</span>
    </div>
    <nav>
      <a href="/about/"{% if page.url == '/about/' %} class="active"{% endif %}>About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© {{ site.time | date: "%Y" }} {{ site.author }}</p>
  </footer>

</body>
</html>
