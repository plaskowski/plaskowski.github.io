<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} — {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    :root {
      --text:       #e2e2e2;
      --muted:      #888;
      --border:     #2e2e2e;
      --bg:         #141414;
      --surface:    #1e1e1e;
      --accent:     #6ea8fe;
      --max-width:  68ch;
    }

    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 1.05rem;
      font-weight: 300;
      line-height: 1.75;
      color: var(--text);
      background: var(--bg);
      margin: 0;
      padding: 0;
    }

    p { font-weight: 300; }

    h1, h2, h3, h4, h5, h6 { font-weight: 600; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Site header / nav ── */
    .site-header {
      border-bottom: 1px solid var(--border);
      padding: 0.75rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 2rem;
    }
    .site-title {
      font-weight: 600;
      font-size: 1rem;
      color: var(--text);
      text-decoration: none;
      flex-shrink: 0;
    }
    .site-title:hover { text-decoration: none; color: var(--accent); }
    nav { display: flex; gap: 1.25rem; }
    nav a { font-size: 0.9rem; color: var(--muted); }
    nav a:hover { color: var(--accent); text-decoration: none; }
    nav a.active { color: var(--text); font-weight: 500; }

    /* ── Main content ── */
    main {
      max-width: var(--max-width);
      margin: 3rem auto;
      padding: 0 1.5rem;
    }

    /* ── Site footer ── */
    .site-footer {
      border-top: 1px solid var(--border);
      margin-top: 4rem;
      padding: 1.5rem;
      text-align: center;
      font-size: 0.85rem;
      color: var(--muted);
    }
  </style>
</head>
<body>

  <header class="site-header">
    <a class="site-title" href="/">{{ site.title }}</a>
    <nav>
      <a href="/about/"{% if page.url == '/about/' %} class="active"{% endif %}>About</a>
    </nav>
  </header>

  <main>
    {{ content }}
  </main>

  <footer class="site-footer">
    <p>© {{ site.time | date: "%Y" }} {{ site.author }}</p>
  </footer>

</body>
</html>
